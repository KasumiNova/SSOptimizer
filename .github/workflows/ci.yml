name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-java:
    name: Build Java (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ linux, windows ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build reobfuscated jar (${{ matrix.platform }})
        run: |
          ./gradlew build \
            -Pstarsector.gameDir= \
            -Pstarsector.platform=${{ matrix.platform }} \
            -x :native:assemble \
            -x test

      - name: Run unit tests
        run: |
          ./gradlew test \
            -Pstarsector.gameDir= \
            -Pstarsector.platform=${{ matrix.platform }}

      - name: Upload reobf jar
        uses: actions/upload-artifact@v4
        with:
          name: SSOptimizer-reobf-${{ matrix.platform }}
          path: build/libs/SSOptimizer-reobf.jar

  build-native-linux:
    name: Build Native (Linux)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libfreetype-dev \
            libpng-dev \
            libx11-dev \
            libgl-dev

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native library
        run: |
          ./gradlew :native:assemble \
            -Pstarsector.gameDir= \
            -Pstarsector.platform=linux

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: libssoptimizer-linux
          path: native/build/lib/main/debug/libnative.so

  build-native-windows:
    name: Build Native (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg dependencies
        run: |
          vcpkg install libpng freetype --triplet x64-windows

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build native library
        shell: cmd
        run: |
          gradlew.bat :native:assemble ^
            -Pstarsector.gameDir= ^
            -Pstarsector.platform=windows ^
            -Pssoptimizer.native.windows.vcpkgRoot=%VCPKG_INSTALLATION_ROOT% ^
            -Pssoptimizer.native.windows.triplet=x64-windows

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: ssoptimizer-windows
          path: native/build/lib/main/debug/native.dll
