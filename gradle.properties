org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8 -Dsun.stdout.encoding=UTF-8 -Dsun.stderr.encoding=UTF-8
org.gradle.warning.mode=all
org.gradle.parallel=true
org.gradle.caching=true

# Toolchain discovery
org.gradle.java.installations.auto-detect=true
org.gradle.java.installations.auto-download=true

# 机器相关路径不要写入共享仓库。
# 如需覆盖，请在命令行传入：
#   -Pstarsector.gameDir=/path/to/Starsector
#   -Dorg.gradle.java.installations.paths=/path/to/jdk25
# 或设置环境变量：
#   SSOPTIMIZER_GAME_DIR=/path/to/Starsector
